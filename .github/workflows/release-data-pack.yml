name: Release data pack

on:
  push:
    tags:
      - "v*"
      - "data-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build data pack and updater zips
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = $env:GITHUB_REF_NAME
          $version = $tag -replace '^(data-)?v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+') {
            throw "Tag must look like v3.0.1 or data-v3.0.1 (got: $tag)"
          }
          Write-Host "Release version: $version"
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass
          & ".\scripts\Publish-DataRelease.ps1" -Version $version -OutDir dist
          if (-not (Test-Path "dist\QuestCore-Updater.zip")) {
            throw "Build failed: dist\QuestCore-Updater.zip missing"
          }
          Get-ChildItem dist -File | ForEach-Object { Write-Host ("  " + $_.Name + " " + $_.Length + " bytes") }
          exit 0

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: QuestCore Data ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*.zip
          body: |
            ## QuestCore data pack

            - **QuestCore_Data_Vanilla-*.zip** - Classic Era + quest database
            - **QuestCore_Data-*.zip** - Retail guides
            - **QuestCore-Updater.zip** - auto-updater (`Run Updater.bat` or tray mode)

            Engine (UI/code) updates remain on CurseForge.
